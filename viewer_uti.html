<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala UTI — Hospital de Ilhéus [Leitura]</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white: #ffffff;
  --gray-50: #f8f9fa;
  --gray-100: #f1f3f5;
  --gray-200: #e9ecef;
  --gray-300: #dee2e6;
  --gray-400: #ced4da;
  --gray-500: #adb5bd;
  --gray-600: #6c757d;
  --gray-700: #495057;
  --gray-800: #343a40;
  --gray-900: #212529;
  --blue-50:  #e7f5ff;
  --blue-400: #74c0fc;
  --blue-500: #339af0;
  --blue-600: #228be6;
  --blue-700: #1c7ed6;
  --teal-50:  #e6fcf5;
  --teal-600: #0ca678;
  --teal-700: #099268;
  --font: 'Inter', system-ui, sans-serif;
  --radius: 8px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 4px 12px rgba(0,0,0,.08);
}

body {
  font-family: var(--font);
  background: var(--gray-50);
  color: var(--gray-900);
  min-height: 100vh;
  font-size: 14px;
}

/* ── HEADER (idêntico à Agenda) ── */
.header {
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  padding: 0 28px;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px; position: sticky; top: 0; z-index: 50;
  box-shadow: var(--shadow-sm);
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-badge {
  background: var(--blue-600); color: white;
  font-size: 11px; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; padding: 3px 10px; border-radius: 20px;
}
.header-title { font-size: 16px; font-weight: 600; }
.header-right { display: flex; align-items: center; gap: 10px; }

/* ── CONTROLS (idêntico à Agenda) ── */
.controls {
  background: var(--white); border-bottom: 1px solid var(--gray-200);
  padding: 14px 28px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.month-nav { display: flex; align-items: center; gap: 8px; }
.month-label { font-size: 15px; font-weight: 600; min-width: 180px; text-align: center; }
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--font); font-size: 13px; font-weight: 500;
  padding: 7px 14px; border-radius: var(--radius);
  border: 1px solid var(--gray-300); background: var(--white);
  color: var(--gray-700); cursor: pointer; transition: all .15s;
}
.btn:hover { background: var(--gray-100); }
.btn-primary { background: var(--blue-600); border-color: var(--blue-600); color: white; }
.btn-primary:hover { background: var(--blue-700); border-color: var(--blue-700); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.sep { width: 1px; height: 24px; background: var(--gray-200); }

/* ── VIEW TOGGLE (idêntico à Agenda) ── */
.view-toggle { display: flex; gap: 4px; }
.view-btn {
  padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--gray-300); background: var(--white); cursor: pointer;
  font-family: var(--font); color: var(--gray-700); transition: all .15s;
}
.view-btn.active { background: var(--gray-900); border-color: var(--gray-900); color: white; }

/* ── COUNTER BAR (substitui legend-bar da Agenda) ── */
.counter-bar {
  padding: 10px 28px; background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  min-height: 42px;
}
.counter-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: var(--gray-500);
}
.counter-chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600; padding: 3px 11px; border-radius: 20px;
}
.counter-n {
  background: rgba(0,0,0,.12); border-radius: 20px;
  padding: 0 5px; font-size: 10px; font-weight: 700;
}

/* ── CALENDAR VIEW ── */
.cal-wrap { padding: 20px 28px; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-header-day {
  text-align: center; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .07em;
  color: var(--gray-500); padding: 6px 0;
}
.cal-cell {
  background: var(--white); border: 1px solid var(--gray-200);
  border-radius: var(--radius); min-height: 90px;
  cursor: pointer; transition: border-color .12s, box-shadow .12s;
  overflow: hidden; display: flex; flex-direction: column;
}
.cal-cell:hover { border-color: var(--blue-400); box-shadow: 0 0 0 2px var(--blue-50); }
.cal-cell.other-month { opacity: .35; pointer-events: none; }
.cal-cell.today { border: 2px solid var(--blue-500); }
.cal-cell.today .cal-day-num { color: var(--blue-600); }
.cal-day-num { font-size: 11px; font-weight: 700; color: var(--gray-600); padding: 5px 7px 3px; flex-shrink: 0; }
.cell-slots { display: flex; flex-direction: column; flex: 1; }
.cell-slot {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 2px 4px; gap: 4px; min-height: 0;
  border-top: 1px solid rgba(0,0,0,.06);
  transition: filter .12s;
  text-align: center;
}
.cell-slot:first-child { border-top: none; }
.cal-cell:hover .cell-slot { filter: brightness(.97); }
.slot-icon { font-size: 9px; flex-shrink: 0; opacity: 1; line-height: 1; }
.slot-name { font-size: 10px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.slot-empty { font-size: 9px; opacity: .3; font-style: italic; }

/* ── LIST VIEW ── */
.list-wrap { padding: 16px 28px; }
.list-week { margin-bottom: 20px; }
.week-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--gray-500);
  padding: 6px 0; margin-bottom: 6px;
  border-bottom: 1px solid var(--gray-200);
}
.list-row {
  display: grid; grid-template-columns: 90px 1fr 1fr;
  background: var(--white); border: 1px solid var(--gray-200);
  border-radius: var(--radius); margin-bottom: 3px;
  overflow: hidden; transition: box-shadow .12s;
}
.list-row:hover { box-shadow: var(--shadow-sm); }
.list-row.today-row { border-color: var(--blue-400); background: var(--blue-50); }
.list-date {
  padding: 10px 12px; border-right: 1px solid var(--gray-100);
  display: flex; flex-direction: column; justify-content: center;
}
.list-date-num { font-size: 18px; font-weight: 700; line-height: 1; color: var(--gray-900); }
.list-date-day { font-size: 10px; font-weight: 600; text-transform: uppercase; color: var(--gray-500); margin-top: 2px; }
.today-row .list-date-num { color: var(--blue-600); }
.list-slot {
  padding: 8px 12px; border-right: 1px solid var(--gray-100);
  cursor: pointer; transition: background .12s;
}
.list-slot:last-child { border-right: none; }
.list-slot:hover { background: var(--gray-50); }
.slot-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; margin-bottom: 4px;
}
.slot-label.dia   { color: var(--teal-600); }
.slot-label.noite { color: var(--blue-600); }
.slot-empty { font-size: 12px; color: var(--gray-400); font-style: italic; }
.slot-doc {
  font-size: 13px; font-weight: 600; color: var(--gray-800);
  display: inline-block; padding: 2px 10px; border-radius: 20px; margin-top: 2px;
}

/* ── MODAL (idêntico à Agenda, adaptado) ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.3); z-index: 200;
  align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--white); border-radius: 14px; padding: 28px;
  width: 420px; max-width: 95vw;
  box-shadow: 0 20px 60px rgba(0,0,0,.12);
}
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
.modal-sub   { font-size: 12px; color: var(--gray-600); margin-bottom: 22px; }
.form-group  { margin-bottom: 16px; }
.form-label  {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: var(--gray-600); margin-bottom: 7px;
  display: flex; align-items: center; gap: 6px;
}
.form-label-dot { width: 8px; height: 8px; border-radius: 50%; }
.form-input {
  width: 100%; border: 1px solid var(--gray-300); border-radius: var(--radius);
  padding: 9px 12px; font-family: var(--font); font-size: 13px;
  outline: none; transition: border-color .15s;
}
.form-input:focus { border-color: var(--blue-600); box-shadow: 0 0 0 3px var(--blue-50); }
.quick-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
.chip {
  font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
  border: 1px solid transparent; cursor: pointer;
  font-family: var(--font); transition: all .1s;
}
.chip:hover { opacity: .85; border-color: rgba(0,0,0,.15); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* ── TOAST (idêntico à Agenda) ── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--gray-900); color: white;
  padding: 11px 18px; border-radius: 8px; font-size: 13px; font-weight: 500;
  z-index: 999; opacity: 0; transform: translateY(8px);
  transition: all .2s; pointer-events: none; box-shadow: var(--shadow);
}
.toast.show { opacity: 1; transform: translateY(0); }

@media print {
  .header-right, .btn, .overlay, .toast, .view-toggle { display: none !important; }
  .cal-wrap, .list-wrap { padding: 0; }
  body { background: white; font-size: 12px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>

function load() {
  try { return JSON.parse(localStorage.getItem(KEY) || 'null') || SEED; } catch { return SEED; }
}
function persist(d) { localStorage.setItem(KEY, JSON.stringify(d)); }
if (!localStorage.getItem(KEY)) persist(SEED);

function monthKey() {
  return `ESCALA UTI - HI - ${MONTHS[vm].toUpperCase()} ${vy}`;
}
function monthData() { return load()[monthKey()] || {}; }
function ds(d) { return `${vy}-${String(vm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

// ── STATE ──
const now = new Date();
let vy = now.getFullYear(), vm = now.getMonth();
let currentView = 'cal';
let editDate = null;

// ── NAV ──
function changeMonth(dir) {
  vm += dir;
  if (vm < 0) { vm = 11; vy--; }
  if (vm > 11) { vm = 0; vy++; }
  render();
}
function goToday() { vy = now.getFullYear(); vm = now.getMonth(); render(); }
function setView(v) {
  currentView = v;
  document.getElementById('view-cal').style.display  = v==='cal'  ? '' : 'none';
  document.getElementById('view-list').style.display = v==='list' ? '' : 'none';
  document.getElementById('btn-cal').classList.toggle('active',  v==='cal');
  document.getElementById('btn-list').classList.toggle('active', v==='list');
  render();
}
function ensureMonth() {
  const data = load(), k = monthKey();
  if (!data[k]) { data[k] = {}; persist(data); }
  toast(`Mês "${MONTHS[vm]} ${vy}" pronto`);
  render();
}

// ── RENDER ──
function render() {
  document.getElementById('month-label').textContent = `${MONTHS[vm]} ${vy}`;
  if (currentView === 'cal') renderCal();
  else renderList();
  renderCounters();
}

function renderCounters() {
  const md = monthData();
  const counts = {};
  Object.values(md).forEach(day => {
    [day[T_DIA], day[T_NOITE]].forEach(n => { if(n && n.trim()) counts[n.trim()] = (counts[n.trim()]||0)+1; });
  });
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  const bar = document.getElementById('counter-bar');
  if (!sorted.length) {
    bar.innerHTML = '<span class="counter-label">Sem dados —</span> <span style="font-size:12px;color:var(--gray-400)">clique em qualquer dia para adicionar</span>';
    return;
  }
  bar.innerHTML = '<span class="counter-label">Turnos este mês:</span>' +
    sorted.map(([name, n]) => {
      const c = docColor(name);
      return `<span class="counter-chip" style="background:${c.bg};color:${c.tx}">
        ${name} <span class="counter-n">${n}</span>
      </span>`;
    }).join('');
}

// ── CALENDAR ──
function renderCal() {
  const md = monthData();
  const daysInMonth = new Date(vy, vm+1, 0).getDate();
  const firstDay    = (new Date(vy, vm, 1).getDay() + 6) % 7; // Mon=0

  document.getElementById('cal-header').innerHTML =
    DAYS_SHORT.map(d => `<div class="cal-header-day">${d}</div>`).join('');

  let cells = '';
  // Prev month padding
  const prevDays = new Date(vy, vm, 0).getDate();
  for (let i = firstDay-1; i >= 0; i--)
    cells += `<div class="cal-cell other-month"><div class="cal-day-num">${prevDays-i}</div></div>`;

  // This month
  for (let d = 1; d <= daysInMonth; d++) {
    const date   = ds(d);
    const dow    = new Date(vy, vm, d).getDay();
    const isToday   = date === TODAY;
    const isWeekend = dow===0||dow===6;
    const dia   = md[date]?.[T_DIA]   || '';
    const noite = md[date]?.[T_NOITE] || '';
    const cDia   = docColor(dia);
    const cNoite = docColor(noite);

    const diaSlot = dia
      ? `<div class="cell-slot" style="background:${cDia.bg}"><span class="slot-icon" style="color:#b45309;font-weight:700">D</span><span class="slot-name" style="color:${cDia.tx}">${dia}</span></div>`
      : `<div class="cell-slot" style="background:#f9fafb"><span class="slot-empty">— dia</span></div>`;
    const noiteSlot = noite
      ? `<div class="cell-slot" style="background:${cNoite.bg}"><span class="slot-icon" style="color:#3b5bdb;font-weight:700">N</span><span class="slot-name" style="color:${cNoite.tx}">${noite}</span></div>`
      : `<div class="cell-slot" style="background:#f5f7ff"><span class="slot-empty">— noite</span></div>`;

    cells += `<div class="cal-cell${isToday?' today':''}${isWeekend?' weekend':''}" onclick="openModal('${date}')">
      <div class="cal-day-num">${d}</div>
      <div class="cell-slots">${diaSlot}${noiteSlot}</div>
    </div>`;
  }

  // Next month padding
  const total = Math.ceil((firstDay+daysInMonth)/7)*7;
  for (let d = 1; d <= total-firstDay-daysInMonth; d++)
    cells += `<div class="cal-cell other-month"><div class="cal-day-num">${d}</div></div>`;

  document.getElementById('cal-body').innerHTML = cells;
}



// ── LIST ──
function renderList() {
  const md = monthData();
  const daysInMonth = new Date(vy, vm+1, 0).getDate();
  const firstDow    = (new Date(vy, vm, 1).getDay() + 6) % 7; // Mon=0
  let html = '', weekHtml = '', weekNum = 0;

  for (let d = 1; d <= daysInMonth; d++) {
    const date = ds(d);
    const dow  = new Date(vy, vm, d).getDay();
    const isToday = date === TODAY;
    const newWeek = Math.floor((d + firstDow - 1) / 7);

    if (newWeek > weekNum) {
      weekNum = newWeek;
      if (weekHtml) html += weekHtml + '</div>';
      html += `<div class="list-week"><div class="week-label">Semana ${weekNum}</div>`;
      weekHtml = '';
    }

    const dia   = md[date]?.[T_DIA]   || '';
    const noite = md[date]?.[T_NOITE] || '';
    const cDia   = docColor(dia);
    const cNoite = docColor(noite);

    const diaSlotBg   = dia   ? cDia.bg   : 'var(--white)';
    const noiteSlotBg = noite ? cNoite.bg : 'var(--white)';
    weekHtml += `<div class="list-row${isToday?' today-row':''}" onclick="openModal('${date}')">
      <div class="list-date">
        <div class="list-date-num">${d}</div>
        <div class="list-date-day">${DAYS_SHORT[dow]}</div>
      </div>
      <div class="list-slot" style="background:${diaSlotBg}">
        <div class="slot-label dia">☀ 7h–19h</div>
        ${dia
          ? `<span class="slot-doc" style="color:${cDia.tx}">${dia}</span>`
          : `<div class="slot-empty">—</div>`}
      </div>
      <div class="list-slot" style="background:${noiteSlotBg}">
        <div class="slot-label noite">🌙 19h–7h</div>
        ${noite
          ? `<span class="slot-doc" style="color:${cNoite.tx}">${noite}</span>`
          : `<div class="slot-empty">—</div>`}
      </div>
    </div>`;
  }
  if (weekHtml) html += weekHtml + '</div>';
  document.getElementById('list-body').innerHTML = html || '<div style="padding:32px;text-align:center;color:var(--gray-400)">Sem dados neste mês</div>';
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModal();
  if (e.key==='Enter' && document.getElementById('overlay').classList.contains('open') && e.target.tagName==='INPUT') saveEntry();
});

warmColors(load());
render();
document.getElementById('last-updated').textContent = 'Dados de ' + new Date().toLocaleDateString('pt-BR');
</script>
