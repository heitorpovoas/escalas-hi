<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda — Plantões e Viagens</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white: #ffffff;
  --gray-50: #f8f9fa;
  --gray-100: #f1f3f5;
  --gray-200: #e9ecef;
  --gray-300: #dee2e6;
  --gray-500: #adb5bd;
  --gray-600: #6c757d;
  --gray-700: #495057;
  --gray-800: #343a40;
  --gray-900: #212529;
  --blue-50: #e7f5ff;
  --blue-100: #d0ebff;
  --blue-500: #339af0;
  --blue-600: #228be6;
  --blue-700: #1c7ed6;
  --teal-50: #e6fcf5;
  --teal-100: #c3fae8;
  --teal-600: #0ca678;
  --teal-700: #099268;
  --orange-50: #fff4e6;
  --orange-500: #ff922b;
  --orange-700: #d9480f;
  --violet-50: #f3f0ff;
  --violet-600: #7048e8;
  --font: 'Inter', system-ui, sans-serif;
  --radius: 8px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 4px 12px rgba(0,0,0,.08);
}

body {
  font-family: var(--font);
  background: var(--gray-50);
  color: var(--gray-900);
  min-height: 100vh;
  font-size: 14px;
}

/* ── HEADER ── */
.header {
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  padding: 0 28px;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px; position: sticky; top: 0; z-index: 50;
  box-shadow: var(--shadow-sm);
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-badge {
  background: var(--teal-600); color: white;
  font-size: 11px; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; padding: 3px 10px; border-radius: 20px;
}
.header-title { font-size: 16px; font-weight: 600; }
.header-right { display: flex; align-items: center; gap: 10px; }

/* ── CONTROLS ── */
.controls {
  background: var(--white); border-bottom: 1px solid var(--gray-200);
  padding: 14px 28px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.month-nav { display: flex; align-items: center; gap: 8px; }
.month-label { font-size: 15px; font-weight: 600; min-width: 180px; text-align: center; }
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--font); font-size: 13px; font-weight: 500;
  padding: 7px 14px; border-radius: var(--radius);
  border: 1px solid var(--gray-300); background: var(--white);
  color: var(--gray-700); cursor: pointer; transition: all .15s;
}
.btn:hover { background: var(--gray-100); }
.btn-primary { background: var(--teal-600); border-color: var(--teal-600); color: white; }
.btn-primary:hover { background: var(--teal-700); border-color: var(--teal-700); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.sep { width: 1px; height: 24px; background: var(--gray-200); }

/* ── VIEWS: Calendar or List ── */
.view-toggle { display: flex; gap: 4px; }
.view-btn {
  padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--gray-300); background: var(--white); cursor: pointer;
  font-family: var(--font); color: var(--gray-700); transition: all .15s;
}
.view-btn.active { background: var(--gray-900); border-color: var(--gray-900); color: white; }

/* ── CALENDAR VIEW ── */
.cal-wrap { padding: 20px 28px; }
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
}
.cal-header-day {
  text-align: center; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .07em;
  color: var(--gray-500); padding: 6px 0;
}
.cal-cell {
  background: var(--white); border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  cursor: pointer; transition: border-color .12s, box-shadow .12s;
  display: flex; flex-direction: column;
}
.cal-cell:hover { border-color: var(--teal-600); box-shadow: 0 0 0 2px var(--teal-50); }
.cal-cell.other-month { opacity: .35; pointer-events: none; }
.cal-cell.today { border: 2px solid var(--blue-500); }
.cal-cell.today .cal-day-num { color: var(--blue-600); }
.cal-day-num { font-size: 11px; font-weight: 700; color: var(--gray-600); padding: 5px 7px 3px; flex-shrink: 0; }
.cell-slots { display: flex; flex-direction: column; }
.cell-slot {
  height: 44px;
  display: flex; align-items: center;
  padding: 3px 5px; gap: 4px;
  border-top: 1px solid rgba(0,0,0,.06);
  transition: filter .12s; overflow: hidden;
}
.cell-slot:first-child { border-top: none; }
.cal-cell:hover .cell-slot { filter: brightness(.97); }
.slot-icon { font-size: 9px; flex-shrink: 0; font-weight: 700; align-self: flex-start; margin-top: 3px; }
.slot-name {
  font-size: 10px; font-weight: 600; line-height: 1.35;
  word-break: break-word; overflow-wrap: break-word;
  flex: 1; text-align: center;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.slot-empty { font-size: 9px; opacity: .3; font-style: italic; flex: 1; text-align: center; }

/* ── LIST VIEW ── */
.list-wrap { padding: 16px 28px; }
.list-week {
  margin-bottom: 20px;
}
.week-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--gray-500);
  padding: 6px 0; margin-bottom: 6px;
  border-bottom: 1px solid var(--gray-200);
}
.list-row {
  display: grid; grid-template-columns: 90px 1fr 1fr;
  gap: 0; background: var(--white);
  border: 1px solid var(--gray-200); border-radius: var(--radius);
  margin-bottom: 3px; overflow: hidden; transition: box-shadow .12s;
}
.list-row:hover { box-shadow: var(--shadow-sm); }
.list-row.today-row { border-color: var(--blue-400); background: var(--blue-50); }
.list-date {
  padding: 10px 12px; border-right: 1px solid var(--gray-100);
  display: flex; flex-direction: column; justify-content: center;
}
.list-date-num { font-size: 18px; font-weight: 700; line-height: 1; color: var(--gray-900); }
.list-date-day { font-size: 10px; font-weight: 600; text-transform: uppercase; color: var(--gray-500); margin-top: 2px; }
.today-row .list-date-num { color: var(--blue-600); }
.list-slot {
  padding: 8px 12px; border-right: 1px solid var(--gray-100);
  cursor: pointer; transition: background .12s;
}
.list-slot:last-child { border-right: none; }
.list-slot:hover { background: var(--gray-50); }
.slot-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; margin-bottom: 4px;
}
.slot-label.dia { color: var(--teal-600); }
.slot-label.noite { color: var(--blue-600); }
.slot-empty { font-size: 12px; color: var(--gray-400); font-style: italic; }
.slot-text { font-size: 13px; font-weight: 500; color: var(--gray-800); }
.slot-tag { display: inline-block; padding: 1px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-top: 2px; }

/* ── MODAL ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.3); z-index: 200;
  align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--white); border-radius: 14px; padding: 28px;
  width: 420px; max-width: 95vw;
  box-shadow: 0 20px 60px rgba(0,0,0,.12);
}
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
.modal-sub { font-size: 12px; color: var(--gray-600); margin-bottom: 22px; }
.form-group { margin-bottom: 16px; }
.form-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: var(--gray-600); margin-bottom: 7px; display: flex; align-items: center; gap: 6px;
}
.form-label-dot { width: 8px; height: 8px; border-radius: 50%; }
.form-input {
  width: 100%; border: 1px solid var(--gray-300); border-radius: var(--radius);
  padding: 9px 12px; font-family: var(--font); font-size: 13px;
  outline: none; transition: border-color .15s;
}
.form-input:focus { border-color: var(--teal-600); box-shadow: 0 0 0 3px var(--teal-50); }
.quick-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
.chip {
  font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px;
  border: 1px solid var(--gray-300); background: var(--white); cursor: pointer;
  font-family: var(--font); color: var(--gray-700); transition: all .1s;
}
.chip:hover { border-color: var(--teal-600); color: var(--teal-700); background: var(--teal-50); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--gray-900); color: white;
  padding: 11px 18px; border-radius: 8px; font-size: 13px; font-weight: 500;
  z-index: 999; opacity: 0; transform: translateY(8px);
  transition: all .2s; pointer-events: none; box-shadow: var(--shadow);
}
.toast.show { opacity: 1; transform: translateY(0); }

/* Legend bar */
.legend-bar {
  padding: 10px 28px; background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--gray-600); }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; }

@media print {
  .header-right, .btn, .overlay, .toast, .view-toggle { display: none !important; }
  .cal-wrap, .list-wrap { padding: 0; }
  body { background: white; font-size: 12px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <span class="header-badge">AGENDA</span>
    <span class="header-title">Plantões &amp; Viagens</span>
  </div>
  <div class="header-right">
    <button class="btn btn-sm" onclick="window.print()">🖨 Imprimir</button>
    <button class="btn btn-sm" onclick="exportCSV()">⬇ CSV</button>
    <button class="btn btn-sm btn-primary" onclick="exportViewer()">📤 Compartilhar</button>
  </div>
</header>

<div class="controls">
  <div class="month-nav">
    <button class="btn btn-sm" onclick="changeMonth(-1)">‹ Anterior</button>
    <div class="month-label" id="month-label"></div>
    <button class="btn btn-sm" onclick="changeMonth(1)">Próximo ›</button>
  </div>
  <div class="sep"></div>
  <button class="btn btn-sm" onclick="goToday()">Hoje</button>
  <div class="sep"></div>
  <div class="view-toggle">
    <button class="view-btn active" id="btn-cal" onclick="setView('cal')">📅 Calendário</button>
    <button class="view-btn" id="btn-list" onclick="setView('list')">☰ Lista</button>
  </div>
</div>

<div class="legend-bar">
  <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#adb5bd">Legenda:</span>
  <div class="legend-item"><div class="legend-dot" style="background:#0ca678"></div> Plantão HI (Ilhéus)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#228be6"></div> Plantão HOE</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff922b"></div> Viagem / Deslocamento</div>
  <div class="legend-item"><div class="legend-dot" style="background:#adb5bd"></div> Outros</div>
</div>

<div id="view-cal">
  <div class="cal-wrap">
    <div class="cal-grid" id="cal-header"></div>
    <div class="cal-grid" id="cal-body" style="margin-top:4px"></div>
  </div>
</div>

<div id="view-list" style="display:none">
  <div class="list-wrap" id="list-body"></div>
</div>

<!-- EDIT MODAL -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">Registrar atividade</div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="form-group">
      <div class="form-label">
        <div class="form-label-dot" style="background:#0ca678"></div>
        DIA (manhã / tarde)
      </div>
      <input class="form-input" id="inp-dia" placeholder="ex: PLANTÃO HI, Consultório BAROS, Cirurgia HSA...">
      <div class="quick-chips" id="chips-dia"></div>
    </div>
    <div class="form-group">
      <div class="form-label">
        <div class="form-label-dot" style="background:#228be6"></div>
        NOITE
      </div>
      <input class="form-input" id="inp-noite" placeholder="ex: PLANTÃO HOE, SSA, Carro SSA-IOS...">
      <div class="quick-chips" id="chips-noite"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="clearEntry()">🗑 Limpar</button>
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEntry()">Salvar ✓</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

function classify(text) {
  if (!text) return 'outro';
  const t = text.toUpperCase();

  if (t.includes('PLANTÃO HOE') || t.includes('HOE')) return 'hoe';

  return 'outro';

let viewYear = new Date().getFullYear();
let viewMonth = new Date().getMonth();
let currentView = 'cal';
let editDate = null;

function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  render();
}
function goToday() {
  const t = new Date();
  viewYear = t.getFullYear(); viewMonth = t.getMonth(); render();
}
function setView(v) {
  currentView = v;
  document.getElementById('view-cal').style.display = v==='cal' ? '' : 'none';
  document.getElementById('view-list').style.display = v==='list' ? '' : 'none';
  document.getElementById('btn-cal').classList.toggle('active', v==='cal');
  document.getElementById('btn-list').classList.toggle('active', v==='list');
  render();
}

function render() {
  document.getElementById('month-label').textContent = `${MONTHS_PT[viewMonth]} ${viewYear}`;
  if (currentView === 'cal') renderCal();
  else renderList();
}

function renderCal() {
  const entries = getData();
  const hdr = document.getElementById('cal-header');
  hdr.innerHTML = DAYS_PT.map(d => `<div class="cal-header-day">${d}</div>`).join('');

  const firstDay = (new Date(viewYear, viewMonth, 1).getDay() + 6) % 7; // Mon=0
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const prevDays = new Date(viewYear, viewMonth, 0).getDate();

  let cells = '';
  for (let i = firstDay-1; i >= 0; i--)
    cells += `<div class="cal-cell other-month"><div class="cal-day-num">${prevDays-i}</div></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt = new Date(viewYear, viewMonth, d);
    const entry = entries[ds] || {};
    const isToday = ds === TODAY;
    const isWeekend = dt.getDay()===0||dt.getDay()===6;
    const dia   = entry.dia?.trim()   || '';
    const noite = entry.noite?.trim() || '';
    const cDia   = catStyle(dia);
    const cNoite = catStyle(noite);

    const diaSlot = dia
      ? `<div class="cell-slot" style="background:${cDia.bg}"><span class="slot-icon" style="color:${cDia.icon}">D</span><span class="slot-name" style="color:${cDia.tx}">${dia}</span></div>`
      : `<div class="cell-slot" style="background:#f9fafb"><span class="slot-empty">— dia</span></div>`;
    const noiteSlot = noite
      ? `<div class="cell-slot" style="background:${cNoite.bg}"><span class="slot-icon" style="color:${cNoite.icon}">N</span><span class="slot-name" style="color:${cNoite.tx}">${noite}</span></div>`
      : `<div class="cell-slot" style="background:#f5f7ff"><span class="slot-empty">— noite</span></div>`;

    cells += `<div class="cal-cell${isToday?' today':''}${isWeekend?' weekend':''}" onclick="openModal('${ds}')">
      <div class="cal-day-num">${d}</div>
      <div class="cell-slots">${diaSlot}${noiteSlot}</div>
    </div>`;
  }

  const total = Math.ceil((firstDay+daysInMonth)/7)*7;
  for (let d = 1; d <= total-firstDay-daysInMonth; d++)
    cells += `<div class="cal-cell other-month"><div class="cal-day-num">${d}</div></div>`;

  document.getElementById('cal-body').innerHTML = cells;
}

function catStyle(text) {
  const cls = classify(text || '');
  const map = {
    hi:     { bg:'#e6fcf5', tx:'#087f5b', icon:'#0ca678' },
    hoe:    { bg:'#dbe4ff', tx:'#3b5bdb', icon:'#4263eb' },
    viagem: { bg:'#fff4e6', tx:'#d9480f', icon:'#f76707' },
    outro:  { bg:'#f1f3f5', tx:'#495057', icon:'#868e96' },
  };
  return map[cls] || map.outro;
}

function renderList() {
  const entries = getData();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  let html = '';
  let weekHtml = '';
  let weekNum = 0;

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt = new Date(viewYear, viewMonth, d);
    const entry = entries[ds] || {};
    const isToday = ds === TODAY;

    // Week separator
    const firstDow = (new Date(viewYear, viewMonth, 1).getDay() + 6) % 7;
    const newWeek = Math.floor((d + firstDow - 1) / 7);
    if (newWeek > weekNum) {
      weekNum = newWeek;
      if (weekHtml) html += weekHtml;
      html += `<div class="list-week"><div class="week-label">Semana ${weekNum}</div>`;
      weekHtml = '';
    }

    const dia = entry.dia || '';
    const noite = entry.noite || '';
    if (!dia && !noite) {
      weekHtml += renderListRow(d, dt, ds, '', '', isToday);
    } else {
      weekHtml += renderListRow(d, dt, ds, dia, noite, isToday);
    }
  }
  if (weekHtml) html += weekHtml + '</div>';

  document.getElementById('list-body').innerHTML = html || '<div style="padding:32px;text-align:center;color:#adb5bd">Sem entradas neste mês</div>';
}

function renderListRow(d, dt, ds, dia, noite, isToday) {
  const cDia   = catStyle(dia);
  const cNoite = catStyle(noite);

  return `<div class="list-row${isToday?' today-row':''}" onclick="openModal('${ds}')">
    <div class="list-date">
      <div class="list-date-num">${d}</div>
      <div class="list-date-day">${DAYS_PT[(dt.getDay()+6)%7]}</div>
    </div>
    <div class="list-slot" style="background:${dia?cDia.bg:'var(--white)'}">
      <div class="slot-label dia" style="color:${cDia.icon}">D DIA</div>
      ${dia ? `<div class="slot-text" style="color:${cDia.tx}">${dia}</div>` : `<div class="slot-empty">—</div>`}
    </div>
    <div class="list-slot" style="background:${noite?cNoite.bg:'var(--white)'}">
      <div class="slot-label noite" style="color:${cNoite.icon}">N NOITE</div>
      ${noite ? `<div class="slot-text" style="color:${cNoite.tx}">${noite}</div>` : `<div class="slot-empty">—</div>`}
    </div>
  </div>`;
}

function openModal(ds) {
  editDate = ds;
  const entries = getData();
  const entry = entries[ds] || {};
  const [y, m, d] = ds.split('-');
  const dt = new Date(y, m-1, d);

  document.getElementById('modal-title').textContent = 'Registrar atividade';
  document.getElementById('modal-sub').textContent = `${DAYS_FULL[dt.getDay()]}, ${parseInt(d)} de ${MONTHS_PT[parseInt(m)-1]} de ${y}`;
  document.getElementById('inp-dia').value = entry.dia || '';
  document.getElementById('inp-noite').value = entry.noite || '';

  const makeChips = (id, inputId) => {
    document.getElementById(id).innerHTML = QUICK_SUGGESTIONS.map(s =>
      `<button class="chip" onclick="document.getElementById('${inputId}').value='${s}'">${s}</button>`
    ).join('');
  };
  makeChips('chips-dia', 'inp-dia');
  makeChips('chips-noite', 'inp-noite');

  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('inp-dia').focus(), 50);
}
function closeOverlay(e) { if (e.target.id==='overlay') closeModal(); }
function closeModal() { document.getElementById('overlay').classList.remove('open'); editDate = null; }
function clearEntry() {
  if (!editDate) return;
  const data = getData(); delete data[editDate];
  saveData(data); closeModal(); render(); toast('Entrada removida');
}
function saveEntry() {
  if (!editDate) return;
  const dia = document.getElementById('inp-dia').value.trim();
  const noite = document.getElementById('inp-noite').value.trim();
  const data = getData();
  if (dia || noite) data[editDate] = {dia, noite};
  else delete data[editDate];
  saveData(data); closeModal(); render(); toast('✓ Salvo');
}

// ── EXPORT ──
function exportCSV() {
  const entries = getData();
  const rows = [['Data','Dia da Semana','DIA','Categoria DIA','NOITE','Categoria NOITE']];
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt = new Date(viewYear, viewMonth, d);
    const e = entries[ds] || {};
    rows.push([ds, DAYS_FULL[dt.getDay()], e.dia||'', classify(e.dia||''), e.noite||'', classify(e.noite||'')]);
  }
  const csv = rows.map(r => r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'}));
  a.download = `agenda_${MONTHS_PT[viewMonth].toLowerCase()}_${viewYear}.csv`;
  a.click();
  toast('⬇ CSV exportado!');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModal();
  if (e.key==='Enter' && document.getElementById('overlay').classList.contains('open') && e.target.tagName==='INPUT') saveEntry();
});
